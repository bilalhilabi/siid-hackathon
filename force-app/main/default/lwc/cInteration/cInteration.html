<template>
    <lightning-card title="Albums Data with Pagination" icon-name="custom:custom14">
        <template if:true={albums}>
            <lightning-datatable
                key-field="id"
                data={pagedData}
                columns={columns}>
            </lightning-datatable>
            
            
            <div class="slds-m-top_medium slds-align_absolute-center">
                <lightning-button label="Previous" onclick={handlePrevious} disabled={disablePrevious}></lightning-button>
                <span class="slds-m-horizontal_medium">Page {currentPage} of {totalPages}</span>
                <lightning-button label="Next" onclick={handleNext} disabled={disableNext}></lightning-button>
            </div>
        </template>
        
        <template if:true={error}>
            <p class="slds-text-color_error">{error}</p>
        </template>
    </lightning-card>
</template>
