<template>
    <lightning-card title="Account Management">
        <div class="slds-p-around_medium">
            <lightning-datatable 
                key-field="Id"
                data={accountData}
                columns={columns}
                draft-values={draftValues}
                hide-checkbox-column="true"
                oncellchange={handleCellChange}>
            </lightning-datatable>
        </div>
<!--fjshkjd-->
        <div class="slds-p-around_medium">
            <lightning-button 
                label="Update" 
                variant="brand" 
                onclick={openConfirmationModal} 
                disabled={isUpdateDisabled}>
            </lightning-button>
        </div>
    </lightning-card>

    <!-- Confirmation Modal -->
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading" aria-modal="true"
            class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 id="modal-heading" class="slds-text-heading_medium">Confirm Update</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p>Are you sure you want to update all modified records?</p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                    <lightning-button label="Confirm" variant="brand" onclick={saveChanges}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
