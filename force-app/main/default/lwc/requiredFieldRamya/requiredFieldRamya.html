<template>

    <lightning-card title="User Form">
        <p>{proofname}</p>
       
        <template for:each={mydetail} for:item="my">
            <p key={my.id}>{my.name}</p>
            <p key={my.id}>{my.address.street}</p>
             <!-- <p key={my.id}>{skj}</p> -->
            

            <!-- <template for:each={my.skill} for:item="add">
            <p key={add.zip}>{add.street}</p>
        </template> -->
             
        </template>
         <!-- <p>{mydetail.name}</p>  -->
        <lightning-input 
            label="Username" 
            value={username} 
            onchange={handleChange}
            required>
        </lightning-input>

        <lightning-button 
            label="Submit" 
            onclick={handleSubmit} 
            class="slds-m-top_medium">
        </lightning-button>
    </lightning-card>

    <c-child-track 
        company-name={companyName}>
    </c-child-track>
</template>
