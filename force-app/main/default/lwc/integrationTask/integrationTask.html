<template>
    <lightning-card title="Login">
        <div class="slds-p-around_medium">
            <lightning-input type="text" label="Username" name="username" value={username} onchange={handleInputChange}></lightning-input>
            <lightning-input type="password" label="Password" name="password" value={password} onchange={handleInputChange}></lightning-input>
            <lightning-button label="Login" onclick={handleLogin} class="slds-m-top_medium"></lightning-button>
        </div>
    </lightning-card>

    <template if:true={errorMessage}>
        <p class="slds-text-color_error slds-p-around_medium">{errorMessage}</p>
    </template>

    <template if:true={userDetails}>
        <lightning-card title="User Profile" icon-name="utility:user">
            <div class="slds-p-around_medium">
                <template for:each={userData} for:item="item">
                    <p key={item.label} class="slds-m-bottom_small"><strong>{item.label}</strong>: {item.value}</p>
                </template>
            </div>
        </lightning-card>
    </template>
</template>
